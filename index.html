<style>

/* ===== NOTIFICARI ===== */
#notifyBox{
    position:fixed;
    top:90px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    z-index:2000;
}
.notify{
    background:rgba(0,0,0,0.75);
    padding:15px 20px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    animation:slideIn .5s ease forwards;
    font-size:14px;
}
@keyframes slideIn{
    from{transform:translateX(100px);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}

/* ===== CURSOR GLOW ===== */
#cursorGlow{
    position:fixed;
    width:25px;
    height:25px;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle,rgba(0,255,255,0.6),transparent 70%);
    mix-blend-mode:screen;
    z-index:3000;
}

/* ===== BACK TO TOP ===== */
#topBtn{
    position:fixed;
    bottom:90px;
    right:20px;
    padding:12px 18px;
    border-radius:30px;
    background:linear-gradient(45deg,#00f2ff,#00ff95);
    border:none;
    color:white;
    font-weight:600;
    cursor:pointer;
    display:none;
    z-index:1500;
}

/* ===== LIVE COUNTER ===== */
#liveStats{
    position:fixed;
    top:90px;
    left:20px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    padding:15px;
    border-radius:15px;
    font-size:14px;
    z-index:1500;
}

/* ===== PROGRESS BAR ===== */
#scrollBar{
    position:fixed;
    top:0;
    left:0;
    height:4px;
    width:0%;
    background:linear-gradient(90deg,#00f2ff,#00ff95);
    z-index:5000;
}

</style>

<div id="scrollBar"></div>
<div id="notifyBox"></div>
<div id="cursorGlow"></div>
<button id="topBtn">Sus ↑</button>

<div id="liveStats">
    👥 Jucatori Online: <span id="players">0</span><br>
    💰 Bani in economie: <span id="money">0</span>$
</div>

<script>

/* ===== PROGRESS SCROLL ===== */
window.addEventListener("scroll",()=>{
    let winScroll=document.body.scrollTop||document.documentElement.scrollTop;
    let height=document.documentElement.scrollHeight-document.documentElement.clientHeight;
    let scrolled=(winScroll/height)*100;
    document.getElementById("scrollBar").style.width=scrolled+"%";

    if(winScroll>400){
        document.getElementById("topBtn").style.display="block";
    }else{
        document.getElementById("topBtn").style.display="none";
    }
});

/* ===== BACK TO TOP ===== */
document.getElementById("topBtn").onclick=()=>{
    window.scrollTo({top:0,behavior:"smooth"});
};

/* ===== CURSOR EFFECT ===== */
const glow=document.getElementById("cursorGlow");
document.addEventListener("mousemove",(e)=>{
    glow.style.left=e.clientX-12+"px";
    glow.style.top=e.clientY-12+"px";
});

/* ===== RANDOM NOTIFICATIONS ===== */
const notifyBox=document.getElementById("notifyBox");
function createNotification(text){
    let n=document.createElement("div");
    n.className="notify";
    n.innerText=text;
    notifyBox.appendChild(n);
    setTimeout(()=>{n.remove();},4000);
}

setInterval(()=>{
    const messages=[
        "🔥 Un nou jucator s-a alaturat serverului!",
        "🚓 Recrutari deschise la Politie!",
        "💰 Salariile au fost platite!",
        "🚗 Masini noi adaugate!",
        "🎉 Eveniment live activ!"
    ];
    createNotification(messages[Math.floor(Math.random()*messages.length)]);
},10000);

/* ===== LIVE FAKE STATS ===== */
let players=120;
let money=250000;

setInterval(()=>{
    players+=Math.floor(Math.random()*5-2);
    money+=Math.floor(Math.random()*1000);

    if(players<80) players=80;

    document.getElementById("players").innerText=players;
    document.getElementById("money").innerText=money.toLocaleString();
},2000);

/* ===== TYPING HERO TEXT ===== */
const heroText=document.querySelector(".hero p");
const originalText=heroText.innerText;
heroText.innerText="";
let i=0;

function typeWriter(){
    if(i<originalText.length){
        heroText.innerText+=originalText.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}
typeWriter();

/* ===== CARD ANIMATION ON SCROLL ===== */
const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.style.transform="translateY(0)";
            entry.target.style.opacity="1";
        }
    });
},{threshold:0.3});

document.querySelectorAll(".card").forEach(card=>{
    card.style.transform="translateY(40px)";
    card.style.opacity="0";
    card.style.transition="0.6s ease";
    observer.observe(card);
});

/* ===== SOUND CLICK EFFECT ===== */
const clickSound=new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3");
document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
        clickSound.currentTime=0;
        clickSound.play();
    });
});

/* ===== DYNAMIC TITLE EFFECT ===== */
let titleText="RUTA661 🔥 ";
setInterval(()=>{
    document.title=titleText;
    titleText=titleText.slice(1)+titleText[0];
},300);

</script>
